name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      matrix:
        compiler:
          - { name: gcc, cc: gcc, cxx: g++ }
          - { name: clang, cc: clang, cxx: clang++ }
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential gcc clang cppcheck valgrind

    - name: Cache build
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ matrix.compiler.name }}-build-${{ hashFiles('CMakeLists.txt', '*.c', '*.h') }}
        restore-keys: |
          ${{ matrix.compiler.name }}-build-

    - name: Configure CMake
      env:
        CC: ${{ matrix.compiler.cc }}
        CXX: ${{ matrix.compiler.cxx }}
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Run tests
      if: hashFiles('tests/test_opcodes.c') != ''
      run: |
        if [ -f build/test_opcodes ]; then
          ./build/test_opcodes
        elif [ -f build/Release/test_opcodes ]; then
          ./build/Release/test_opcodes
        else
          echo "No test executable found, skipping"
        fi

    - name: Static analysis (cppcheck)
      if: matrix.compiler.name == 'gcc'
      continue-on-error: true
      run: |
        cppcheck --enable=warning,style --suppress=missingIncludeSystem \
          --std=c11 \
          --language=c \
          code.c || echo "cppcheck completed with warnings"

    - name: Run valgrind memcheck
      if: matrix.compiler.name == 'gcc' && hashFiles('tests/test_opcodes.c') != ''
      continue-on-error: true
      run: |
        if [ -f build/test_opcodes ]; then
          valgrind --leak-check=full --error-exitcode=1 \
            ./build/test_opcodes || echo "valgrind completed with warnings"
        elif [ -f build/Release/test_opcodes ]; then
          valgrind --leak-check=full --error-exitcode=1 \
            ./build/Release/test_opcodes || echo "valgrind completed with warnings"
        else
          echo "No test executable found, skipping valgrind"
        fi
